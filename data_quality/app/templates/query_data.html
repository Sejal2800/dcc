<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genesis DCC - Inspect Business Rule</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/dcc_logo.png') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

    <style>
        :root {
            --primary-dark: #2c3e50;
            --accent-green: #00ffc8;
        }

        body {
            background: linear-gradient(rgba(44,62,80,0.8), rgba(44,62,80,0.8)),
                        url('{{ url_for("static", filename="images/dq_bg_6.png") }}') center/cover fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
        }

        /* --- Unified Header --- */
        .company-header {
            background: white;
            padding: 0.5rem 2%; 
            display: flex;
            align-items: center; 
            justify-content: space-between;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 1000;
            height: 90px;
            width: 100%;
        }

        .header-left { flex: 1; display: flex; justify-content: flex-start; }
        .header-logo { height: 75px; width: auto; object-fit: contain; }
        .header-center { flex: 2; text-align: center; }
        .company-title { margin: 0; font-size: 1.6rem; font-weight: 700; color: var(--primary-dark); white-space: nowrap; }
        
        .header-right-actions {
            flex: 1;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        /* --- Action Buttons --- */
        .nav-action-btn, .btn-profile {
            background-color: #f8f9fa !important;
            border: 1px solid #dee2e6 !important;
            color: var(--primary-dark) !important;
            padding: 0 20px;
            border-radius: 50px;
            font-weight: 600;
            text-decoration: none;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            height: 42px; 
            transition: all 0.2s ease-in-out;
        }

        .nav-action-btn:hover, .btn-profile:hover {
            background-color: var(--primary-dark) !important;
            color: #ffffff !important;
        }

        /* --- Main Layout --- */
        .main-container {
            flex: 1;
            padding: 3rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .main-title {
            font-size: 2.6rem;
            margin-bottom: 40px;
            font-weight: 500;
            letter-spacing: 1.5px;
            color: #e9fffa;
            text-shadow: 0 0 15px rgba(0, 255, 200, 0.4), 2px 2px 12px rgba(0,0,0,0.7);
        }

        /* --- Glass Card Style --- */
        .inspect-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 25px;
            padding: 35px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 1100px;
            color: var(--primary-dark);
        }

        .form-label {
            font-weight: 600;
            color: var(--primary-dark);
            margin-bottom: 8px;
        }

        .form-select, .form-control {
            border-radius: 10px;
            padding: 10px 15px;
            border: 1px solid #ced4da;
        }

        .btn-run {
            background-color: var(--primary-dark);
            color: white;
            border-radius: 50px;
            padding: 12px 35px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
        }

        .btn-run:hover {
            background-color: #1a252f;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            color: white;
        }

        .btn-suggest {
            background-color: transparent;
            border: 2px solid var(--primary-dark);
            color: var(--primary-dark);
            border-radius: 50px;
            padding: 10px 30px;
            font-weight: 600;
        }

        /* Modal Customization */
        .modal-content { border-radius: 20px; border: none; }
        .modal-header { background: #f8f9fa; border-radius: 20px 20px 0 0; }

    </style>
</head>
<body>

<header class="company-header">
    <div class="header-left">
        <img src="{{ url_for('static', filename='images/dcc_logo.png') }}" class="header-logo" alt="Logo">
    </div>

    <div class="header-center">
        <h1 class="company-title">Genesis Data Control Centre</h1>
    </div>

    <div class="header-right-actions">
        <a href="{{ url_for('dataquality') }}" class="nav-action-btn">
            <i class="bi bi-arrow-left"></i> Back
        </a>
        <a href="{{ url_for('welcome') }}" class="nav-action-btn">
            <i class="bi bi-house"></i> Home
        </a>

        <div class="dropdown profile-dropdown">
            <button class="btn btn-profile dropdown-toggle" type="button" id="userMenu" data-bs-toggle="dropdown" aria-expanded="false">
                <i class="bi bi-person-circle"></i>
                <span class="d-none d-sm-inline">Account</span>
            </button>
            <ul class="dropdown-menu dropdown-menu-end shadow border-0" aria-labelledby="userMenu">
                <li><h6 class="dropdown-header">User Settings</h6></li>
                <li><a class="dropdown-item text-danger" href="/logout"><i class="bi bi-box-arrow-right me-2"></i> Logout</a></li>
            </ul>
        </div>
    </div>
</header>

<main class="main-container">
    <h1 class="main-title">Inspect Business Rule</h1>

    <div class="inspect-card">
        <p class="text-muted mb-4"><i class="bi bi-info-circle me-2"></i>Please select the required values to execute a data quality check.</p>
        
        <form id="ruleForm">
            <div class="row g-4">
                <div class="col-md-6">
                    <label class="form-label">Table Name</label>
                    <select id="Table_Name" class="form-select">
                        <option value="">Select Table...</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Column Name</label>
                    <select id="Column_Name" class="form-select" disabled>
                        <option value="">Select Column...</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Business Rule Definition</label>
                    <select id="Business_Rule_Definition" class="form-select" disabled>
                        <option value="">Select Rule...</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Rule Number</label>
                    <select id="rule_no" class="form-select" disabled></select>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Attribute Group</label>
                    <select id="Attribute_Group" class="form-select" disabled></select>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Dimension</label>
                    <select id="dimension" class="form-select" disabled></select>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Functionality</label>
                    <select id="functionality" class="form-select" disabled></select>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Expected Value</label>
                    <input type="text" id="expected" class="form-control" disabled placeholder="e.g. 10 or 'Active'">
                    <small class="text-muted">Required for length or value based rules.</small>
                </div>
            </div>

            <div class="d-flex gap-3 mt-5">
                <button type="button" class="btn btn-run" onclick="submitRule()">
                    <i class="bi bi-play-fill me-1"></i> Run Query
                </button>
                <button type="button" class="btn btn-suggest" data-bs-toggle="modal" data-bs-target="#suggestionModal">
                    Rule Not Available?
                </button>
            </div>
        </form>
    </div>

    <div id="suggestionMessage" class="alert alert-info mt-4 d-none w-100" style="max-width:1100px;"></div>
    <div id="queryResults" class="mt-4 w-100" style="max-width:1100px;"></div>
</main>

<div class="modal fade" id="suggestionModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title text-dark">Input Data Checks</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <input class="form-control" placeholder="Table Name" id="s_table">
                </div>
                <div class="mb-3">
                    <input class="form-control" placeholder="Column Name" id="s_column">
                </div>
                <div class="mb-3">
                    <textarea class="form-control" placeholder="Describe the suggested business rule..." id="s_rule" rows="4"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary rounded-pill px-4" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-primary rounded-pill px-4" onclick="submitSuggestion()">Run AI Scrutiny</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // [Maintain all your existing Javascript logic here - same as provided in your prompt]
    let rulesData = [];
    fetch("/get-master-rules")
        .then(res => res.json())
        .then(data => {
            rulesData = data.filter(r => r["Table_Name"]);
            populateTables();
        })
        .catch(err => console.error("Error fetching master rules:", err));

    function populateTables() {
        const tableSel = document.getElementById("Table_Name");
        const tables = [...new Set(rulesData.map(r=>r["Table_Name"]))];
        tables.forEach(t => tableSel.innerHTML += `<option value="${t}">${t}</option>`);
    }

    document.getElementById("Table_Name").addEventListener("change", function() {
        resetBelow("Column_Name");
        const cols = [...new Set(rulesData.filter(r=>r["Table_Name"]===this.value).map(r=>r["Column_Name"]))];
        const colSel = document.getElementById("Column_Name");
        colSel.disabled = false;
        colSel.innerHTML = `<option value="">Select Column...</option>`;
        cols.forEach(c=>colSel.innerHTML += `<option>${c}</option>`);
    });

    document.getElementById("Column_Name").addEventListener("change", function() {
        resetBelow("Business_Rule_Definition");
        const table = document.getElementById("Table_Name").value;
        const brds = [...new Set(rulesData.filter(r=>r["Table_Name"]===table && r["Column_Name"]===this.value)
            .map(r=>r["Business_Rule_Definition"]))];
        const brdSel = document.getElementById("Business_Rule_Definition");
        brdSel.disabled = false;
        brdSel.innerHTML = `<option value="">Select Rule...</option>`;
        brds.forEach(b=>brdSel.innerHTML += `<option>${b}</option>`);
    });

    document.getElementById("Business_Rule_Definition").addEventListener("change", function() {
        const row = rulesData.find(r =>
            r["Table_Name"]===document.getElementById("Table_Name").value &&
            r["Column_Name"]===document.getElementById("Column_Name").value &&
            r["Business_Rule_Definition"]===this.value
        );
        setSingle("rule_no", row["Rule_Number"]);
        setSingle("Attribute_Group", row["Attribute_Group"]);
        setSingle("dimension", row["Dimension"]);
        setSingle("functionality", row["Functionality"]);
        toggleExpected(row["Functionality"]);
    });

    function setSingle(id,value){
        const el = document.getElementById(id);
        el.disabled=false;
        el.innerHTML=`<option>${value}</option>`;
    }

    function resetBelow(id){
        const ids=["Column_Name","Business_Rule_Definition","rule_no","Attribute_Group","dimension","functionality"];
        const index = ids.indexOf(id);
        ids.slice(index).forEach(i=>{
            document.getElementById(i).innerHTML="";
            document.getElementById(i).disabled=true;
        });
    }

    function toggleExpected(func){
        const needs=["fixed_length","ranged_length","specific_value"];
        const exp = document.getElementById("expected");
        exp.disabled = !needs.includes(func);
        exp.required = needs.includes(func);
    }

    function submitRule(){
        const formData = {
            table_name: document.getElementById("Table_Name").value,
            column_name: document.getElementById("Column_Name").value,
            functionality: document.getElementById("functionality").value,
            expected: document.getElementById("expected").value
        };

        fetch("/run_query", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(formData)
        })
        .then(res => res.json())
        .then(data => {
            if(data.error) { alert(data.error); return; }
            renderResults(data);
        });
    }

    function renderResults(data){
        let container = document.getElementById("queryResults");
        let addButtonHtml = data.source === "llm" ? `
            <button id="saveRuleIcon" class="btn btn-success btn-sm rounded-pill px-3" title="Save rule to master">
                <i class="bi bi-plus-circle"></i> Add to Master
            </button>` : "";

        let html = `
        <div class="card p-4 mt-4 shadow-sm" style="color: #333">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h4 class="m-0">Query Results</h4>
                ${addButtonHtml}
            </div>
            <div class="table-responsive">
                <table class="table table-hover table-striped">
                    <thead class="table-dark"><tr>`;

        data.columns.forEach(col => html += `<th>${col}</th>`);
        html += `</tr></thead><tbody>`;
        data.rows.forEach(row => {
            html += "<tr>";
            row.forEach(cell => html += `<td>${cell}</td>`);
            html += "</tr>";
        });
        html += `</tbody></table></div></div>`;
        container.innerHTML = html;

        if (data.source === "llm") {
            window.saveRuleContext = {
                rule: data.rule,
                table: data.table || null,
                column: data.column || null,
                dimension: document.getElementById("dimension")?.value || "completeness",
                save_rule: true
            };
            document.getElementById("saveRuleIcon").onclick = saveRuleToMaster;
        }
    }

    function saveRuleToMaster(){
        fetch("/submit_suggestion", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(window.saveRuleContext)
        })
        .then(res => res.json())
        .then(resp => {
            alert(resp.rule_number ? "Rule saved to Master. Rule No: " + resp.rule_number : "Rule saved.");
        }).catch(err => alert("Failed to save rule"));
    }

    function submitSuggestion() {
        const data = {
            table: document.getElementById("s_table").value.trim() || null,
            column: document.getElementById("s_column").value.trim() || null,
            rule: document.getElementById("s_rule").value.trim()
        };

        if (!data.rule) { alert("Please enter the business rule."); return; }

        fetch("/submit_suggestion", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        })
        .then(res => res.json())
        .then(resp => {
            if (resp.status === "implemented") {
                renderResults(resp);
                const msgDiv = document.getElementById("suggestionMessage");
                msgDiv.innerText = resp.message;
                msgDiv.classList.remove("d-none");
                bootstrap.Modal.getInstance(document.getElementById("suggestionModal")).hide();
            } else {
                alert(resp.message || resp.error || "Suggestion failed");
            }
        });
    }
</script>

</body>
</html>
