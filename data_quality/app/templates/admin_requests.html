<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - User Requests</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(to right, #2c5364, #203a43, #0f2027);
    font-family: 'Segoe UI', sans-serif;
    color: white;
}

.container {
    margin-top: 40px;
}

.table-container {
    background: rgba(255,255,255,0.08);
    padding: 25px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
}

table { color: white; }
th { background: rgba(255,255,255,0.15); }

.btn { border-radius: 20px; }

.filter-btn {
    margin-right: 10px;
}

select {
    border-radius: 15px;
    padding: 5px;
}
</style>
</head>

<body>

<div class="container">

    <h3 class="mb-4">📋 User Access Requests</h3>

    <!-- FILTER BUTTONS -->
    <div class="mb-3">
        <button class="btn btn-light filter-btn" onclick="filterTable('all')">All</button>
        <button class="btn btn-warning filter-btn" onclick="filterTable('Pending')">Pending</button>
        <button class="btn btn-success filter-btn" onclick="filterTable('Approved')">Approved</button>
        <button class="btn btn-danger filter-btn" onclick="filterTable('Rejected')">Rejected</button>
    </div>

    <div class="table-container">
        <table class="table table-bordered text-center align-middle" id="requestTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Organization</th>
                    <th>Department</th>
                    <th>Status</th>
                    <th>Role</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>
                {% for row in requests %}
                <tr data-status="{{ row.status if row.status else 'Pending' }}">
                    <td>{{ row.id }}</td>
                    <td>{{ row.name }}</td>
                    <td>{{ row.email }}</td>
                    <td>{{ row.organization }}</td>
                    <td>{{ row.department }}</td>

                    <td id="status-{{ row.id }}">
                        {{ row.status if row.status else 'Pending' }}
                    </td>

                    <!-- ROLE DROPDOWN -->
                    <td>
                        <select id="role-{{ row.id }}">
                            <option value="user">User</option>
                            <option value="admin">Admin</option>
                            <option value="analyst">Analyst</option>
                        </select>
                    </td>

                    <td>
                        <button class="btn btn-success btn-sm approve-btn"
                                data-id="{{ row.id }}">
                            Approve
                        </button>

                        <button class="btn btn-danger btn-sm reject-btn"
                                data-id="{{ row.id }}">
                            Reject
                        </button>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

</div>

<script>

function filterTable(status) {
    const rows = document.querySelectorAll("#requestTable tbody tr");

    rows.forEach(row => {
        const rowStatus = row.getAttribute("data-status");

        if (status === "all" || rowStatus === status) {
            row.style.display = "";
        } else {
            row.style.display = "none";
        }
    });
}

// APPROVE
document.querySelectorAll('.approve-btn').forEach(btn => {
    btn.addEventListener('click', function() {
        const id = this.getAttribute('data-id');
        const role = document.getElementById(`role-${id}`).value;

        fetch('/approve_user', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                id: id,
                role: role
            })
        })
        .then(res => res.json())
        .then(data => {
            if (data.status === "success") {
                document.getElementById("status-" + id).innerText = "Approved";
                location.reload();
            } else {
                alert("Approval failed");
            }
        });
    });
});

// REJECT
document.querySelectorAll('.reject-btn').forEach(btn => {
    btn.addEventListener('click', function() {
        const id = this.getAttribute('data-id');

        fetch('/reject_user', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ id: id })
        })
        .then(res => res.json())
        .then(data => {
            if (data.status === "success") {
                document.getElementById("status-" + id).innerText = "Rejected";
                location.reload();
            } else {
                alert("Reject failed");
            }
        });
    });
});

</script>

</body>
</html>
