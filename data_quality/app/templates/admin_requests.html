<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genesis DCC - User Requests</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="icon" type="image/png"  href="{{ url_for('static', filename='images/dcc_logo.png') }}">
    <style>
        :root {
            --primary-dark: #2c3e50;
            --accent-green: #00ffc8;
            --glass-white: rgba(255, 255, 255, 0.95);
        }
 
        body {
            background: linear-gradient(rgba(44,62,80,0.8), rgba(44,62,80,0.8)),
                        url('{{ url_for("static", filename="images/dq_bg_6.png") }}') center/cover fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }


.company-header {
    background: white;
    padding: 0.5rem 2%; /* Reduced from 5% to push elements to the edges */
    display: flex;
    align-items: center; 
    justify-content: space-between;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    position: sticky;
    top: 0;
    z-index: 1000;
    height: 90px;
    width: 100%;
}

.header-left {
    flex: 1;
    display: flex;
    justify-content: flex-start; /* Forces logo to the far left */
}

.header-logo {
    height: 85px; 
    width: auto;
    object-fit: contain;
}

.header-center {
    flex: 2;
    text-align: center;
}

.company-title {
    margin: 0;
    font-size: 1.6rem;
    font-weight: 700;
    color: #2c3e50;
    white-space: nowrap; /* Prevents title from wrapping */
}

.header-right-actions {
    flex: 1;
    display: flex;
    justify-content: flex-end; /* Forces buttons to the far right */
    gap: 12px;
}

.nav-action-btn, .btn-profile {
    background-color: #f8f9fa !important;
    border: 1px solid #dee2e6 !important;
    color: var(--primary-dark) !important;
    padding: 8px 18px;
    border-radius: 50px;
    font-weight: 600;
    text-decoration: none;
    font-size: 0.85rem;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    height: 42px;
    transition: all 0.2s ease-in-out;
}

/* FIX: Specific targeting for Hover and Open states */
.nav-action-btn:hover, 
.profile-dropdown .btn-profile:hover, 
.profile-dropdown .btn-profile.show,
.profile-dropdown .show > .btn-profile {
    background-color: var(--primary-dark) !important;
    color: #ffffff !important;
    border-color: var(--primary-dark) !important;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}

/* FIX: Ensure the icon changes color too */
.nav-action-btn:hover i, 
.btn-profile:hover i,
.btn-profile.show i {
    color: #ffffff !important;
}

/* Remove the default Bootstrap arrow rotation/shadow if desired */
.dropdown-toggle::after {
    vertical-align: middle;
}

        /* --- Main Content --- */
        .main-title {
            font-size: 2.8rem;
            font-weight: 700;
            margin-top: 2rem; /* Spacing from header */
            margin-bottom: 2.5rem;
            text-shadow: 2px 4px 10px rgba(0,0,0,0.3);
        }

        .card {
            border-radius: 20px;
            border: none;
            background: var(--glass-white);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            color: #333;
        }

        .form-select-lg {
            font-size: 1rem;
            border: 2px solid #eee;
        }

        /* Table Styling */
        .table-container {
            margin-top: 20px;
            border-radius: 15px;
            overflow: hidden;
            background: white;
        }
        .main-card {
    width: 92%;
    max-width: 1400px;
    margin: 40px auto;
    padding: 35px;
    border-radius: 24px;

    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(14px);

    box-shadow: 0 10px 40px rgba(0,0,0,0.35);

    border: 1px solid rgba(255,255,255,0.15);
}

.main-card h3 {
    color: white;
    font-weight: 700;
    margin-bottom: 25px;
    font-size: 2rem;
}

/* Better table look */
.table {
    background: white;
    border-radius: 15px;
    overflow: hidden;
}

.table th {
    white-space: nowrap;
}

/* Better buttons */
.btn-primary,
.btn-success,
.btn-danger {
    border-radius: 10px;
    padding: 8px 18px;
    font-weight: 600;
}

/* Form Styling */
.form-select,
.form-control {
    border-radius: 12px;
    min-height: 45px;
}
    </style>
</head>
<body>

<header class="company-header">
    <div class="header-left">
        <img src="{{ url_for('static', filename='images/dcc_logo.png') }}" class="header-logo" alt="Logo">
    </div>

    <div class="header-center">
        <h1 class="company-title">Genesis Data Control Centre</h1>
    </div>
    <div class="header-right-actions">
        <a href="{{ url_for('welcome') }}" class="nav-action-btn"><i class="bi bi-house-door-fill"></i> Home</a>
        <a href="{{ url_for('account_details') }}" class="nav-action-btn"><i class="bi bi-person-circle"></i> Account</a>
        <a href="{{ url_for('help_center') }}" class="nav-action-btn"><i class="bi bi-question-circle-fill"></i> Help</a>
        <a href="{{ url_for('logout') }}" class="nav-action-btn"><i class="bi bi-box-arrow-right"></i> Logout</a>
    </div>
</header>
{% block content %}

<div class="main-card">

    <h3 class="mb-4">Pending Requests</h3>

    <table class="table table-hover align-middle">
        <thead class="table-dark">
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Org</th>
                <th>Requested Role</th>
                <th>Assign Role</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody>
            {% for r in requests %}
            <tr>
                <td>{{ r.name }}</td>
                <td>{{ r.email }}</td>
                <td>{{ r.organization }}</td>

                <!-- USER REQUESTED ROLE -->
                <td>
                    {{ r.department }}
                </td>

                <!-- ADMIN ASSIGN ROLE -->
                <td>
                    <select class="form-select" id="role-{{ r.id }}">
                        <option value="viewer">User</option>
                        <option value="analyst">Analyst</option>
                        <option value="admin">Admin</option>
                    </select>
                </td>

                <td>
                    <button class="btn btn-success btn-sm"
                            onclick="approve('{{ r.id }}')">
                        Approve
                    </button>

                    <button class="btn btn-danger btn-sm"
                            onclick="reject('{{ r.id }}')">
                        Reject
                    </button>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</div>
<script>

function approve(id){

    const selectedRole =
        document.getElementById(`role-${id}`).value;

    fetch('/approve_user', {
        method:'POST',
        headers:{
            'Content-Type':'application/json'
        },
        body:JSON.stringify({
            id:id,
            role:selectedRole
        })
    })
    .then(res => res.json())
    .then(data => {
        if(data.status === "success"){
            location.reload();
        } else {
            alert("Approval failed");
        }
    });
}

function reject(id){
    fetch('/admin/reject_request/' + id, {
        method:'POST'
    })
    .then(()=>location.reload())
}

</script>

{% endblock %}
