<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - Genesis DCC</title>

    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/dcc_logo.png') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            font-family: 'Segoe UI', sans-serif;
        }

        .left-section {
            width: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            background:
                linear-gradient(rgba(20, 30, 48, 0.85), rgba(36, 59, 85, 0.9)),
                url("{{ url_for('static', filename='images/dq_bg_6.png') }}");
            background-size: cover;
            background-position: center;
        }

        .right-section {
            width: 50%;
            height: 100vh;
            background: url("{{ url_for('static', filename='images/dcc.png') }}") center/cover no-repeat;
        }

        .card-glass {
            width: 400px;
            padding: 35px;
            border-radius: 25px;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            color: white;
        }

        .form-control {
            border-radius: 25px;
            border: none;
            padding: 12px 18px;
            background: rgba(255,255,255,0.2);
            color: white !important;
        }

        .form-control::placeholder {
            color: rgba(255,255,255,0.7);
        }

        .btn-rounded {
            border-radius: 25px;
        }

        .home-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 8px 18px;
            border-radius: 20px;
            border: none;
            background: rgba(255,255,255,0.2);
            color: white;
            backdrop-filter: blur(10px);
        }

        .home-btn:hover {
            background: rgba(255,255,255,0.35);
            cursor: pointer;
        }

        /* POPUP */
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .popup-card {
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            color: white;
            width: 350px;
        }

        .checkmark-circle {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 3px solid #4CAF50;
            margin: auto;
            position: relative;
        }

        .checkmark {
            position: absolute;
            top: 20px;
            left: 18px;
            width: 20px;
            height: 40px;
            border-right: 4px solid #4CAF50;
            border-bottom: 4px solid #4CAF50;
            transform: rotate(45deg);
        }
    </style>
</head>

<body>

<button class="home-btn" onclick="goHome()">← Home</button>

<!-- LEFT -->
<div class="left-section">
    <div class="card-glass">

        <h3 class="text-center mb-3">Request Access</h3>
        <p class="text-center mb-4">Fill in your details to get access to Genesis DCC</p>

        <form id="requestForm">
            <input type="text" name="name" class="form-control mb-3" placeholder="Full Name" required>
            <input type="email" name="email" class="form-control mb-3" placeholder="Email Address" required>
            <input type="text" name="phone" class="form-control mb-3" placeholder="Phone Number" required>
            <input type="text" name="organization" class="form-control mb-3" placeholder="Organization Name" required>
            <input type="text" name="department" class="form-control mb-3" placeholder="Department / Role" required>

            <button type="submit" class="btn btn-success w-100 btn-rounded mt-2">
                Submit Request
            </button>
        </form>

    </div>
</div>

<!-- RIGHT -->
<div class="right-section"></div>

<!-- SUCCESS POPUP -->
<div id="successPopup" class="popup-overlay">
    <div class="popup-card">
        <div class="checkmark-circle">
            <div class="checkmark"></div>
        </div>

        <h4 class="mt-3">Request Submitted</h4>
        <p>
            Thank you for sharing your details.<br><br>
            You will receive login credentials within <b>24–48 hours</b>.
        </p>

        <button class="btn btn-light mt-2" onclick="closePopup()">OK</button>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const form = document.getElementById("requestForm");

    form.addEventListener("submit", function (e) {
        e.preventDefault();

        const formData = new FormData(form);

        fetch("/request_access", {
            method: "POST",
            body: formData
        })
        .then(res => res.json())
        .then(data => {
            if (data.status === "success") {
                showSuccess();
            } else {
                alert("Error saving request");
            }
        })
        .catch(err => console.error("Fetch error:", err));
    });

});

function showSuccess() {
    document.getElementById("successPopup").style.display = "flex";
}

function closePopup() {
    document.getElementById("successPopup").style.display = "none";
    window.location.href = "/";
}

function goHome() {
    window.location.href = "/";
}

</script>

</body>
</html>
