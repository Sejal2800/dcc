<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genesis DCC - Data Quality Report</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/dcc_logo.png') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --primary-dark: #2c3e50;
            --accent-green: #00ffc8;
            --glass-white: rgba(255, 255, 255, 0.95);
        }

        body {
            background: linear-gradient(rgba(44,62,80,0.8), rgba(44,62,80,0.8)),
                        url('{{ url_for("static", filename="images/dq_bg_6.png") }}') center/cover fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow-x: hidden;
        }

        /* --- Unified Header --- */
        .company-header {
            background: white;
            padding: 0.5rem 2%; 
            display: flex;
            align-items: center; 
            justify-content: space-between;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 1000;
            height: 90px;
            width: 100%;
        }

        .header-left {
            flex: 1;
            display: flex;
            justify-content: flex-start;
        }

        .header-logo {
            height: 75px; 
            width: auto;
            object-fit: contain;
        }

        .header-center {
            flex: 2;
            text-align: center;
        }

        .company-title {
            margin: 0;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--primary-dark);
            white-space: nowrap;
        }

        .header-right-actions {
            flex: 1;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        /* --- Button Styling (Unified) --- */
        .nav-action-btn, .btn-profile, .fullscreen-btn {
            background-color: #f8f9fa !important;
            border: 1px solid #dee2e6 !important;
            color: var(--primary-dark) !important;
            padding: 0 20px;
            border-radius: 50px;
            font-weight: 600;
            text-decoration: none;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            height: 42px; 
            transition: all 0.2s ease-in-out;
        }

        .nav-action-btn:hover, 
        .profile-dropdown .btn-profile:hover, 
        .profile-dropdown .btn-profile.show,
        .fullscreen-btn:hover {
            background-color: var(--primary-dark) !important;
            color: #ffffff !important;
            border-color: var(--primary-dark) !important;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .nav-action-btn:hover i, .btn-profile:hover i, .btn-profile.show i {
            color: #ffffff !important;
        }

        /* --- Report Content --- */
        .main-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 2rem 0;
            text-align: center;
            text-shadow: 2px 4px 10px rgba(0,0,0,0.3);
        }

        .report-card {
            background: var(--glass-white);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            margin-bottom: 3rem;
        }

        .pbi-container {
            width: 100%;
            height: 75vh;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 15px;
            border: 1px solid #ddd;
        }

        .pbi-container iframe {
            width: 100%;
            height: 100%;
        }

        /* Fullscreen tweak */
        :fullscreen .pbi-container {
            border-radius: 0;
            height: 100vh;
        }
    </style>
</head>

<body>

<header class="company-header">
    <div class="header-left">
        <img src="{{ url_for('static', filename='images/dcc_logo.png') }}" class="header-logo" alt="Logo">
    </div>

    <div class="header-center">
        <h1 class="company-title">Genesis Data Control Centre</h1>
    </div>

    <div class="header-right-actions">
        <a href="{{ url_for('dataquality') }}" class="nav-action-btn">
            <i class="bi bi-arrow-left"></i> Back
        </a>
        <a href="{{ url_for('welcome') }}" class="nav-action-btn">
            <i class="bi bi-house"></i> Home
        </a>

        <div class="dropdown profile-dropdown">
            <button class="btn btn-profile dropdown-toggle" type="button" id="userMenu" data-bs-toggle="dropdown" aria-expanded="false">
                <i class="bi bi-person-circle"></i>
                <span class="d-none d-sm-inline">Account</span>
            </button>
            <ul class="dropdown-menu dropdown-menu-end shadow border-0" aria-labelledby="userMenu">
                <li><h6 class="dropdown-header">User Settings</h6></li>
                <li><a class="dropdown-item" href="#"><i class="bi bi-person-badge me-2"></i> My Details</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item text-danger" href="/logout"><i class="bi bi-box-arrow-right me-2"></i> Logout</a></li>
            </ul>
        </div>
    </div>
</header>

<main class="container-fluid px-4">
    <h1 class="main-title">📊 Data Quality – Power BI Report</h1>

    <div class="row justify-content-center">
        <div class="col-xl-11">
            <div class="report-card">
                <div class="d-flex justify-content-end mb-3">
                    <button class="fullscreen-btn" onclick="openFullscreen()">
                        <i class="bi bi-fullscreen"></i> Full Screen
                    </button>
                </div>
                
                <div class="pbi-container" id="pbiContainer">
                    <iframe
                        src="https://app.powerbi.com/reportEmbed?reportId=b09c20f7-f509-48b8-93c3-98b3069bfbb3&appId=e8b27654-49e4-4cf7-a296-61bc06df83b2&autoAuth=true&ctid=1689840c-70c7-49ab-a78f-41eb191bd9f2"
                        frameborder="0" 
                        allowFullScreen="true">
                    </iframe>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
function openFullscreen() {
    const elem = document.getElementById("pbiContainer");
    if (!elem) return;

    if (elem.requestFullscreen) {
        elem.requestFullscreen();
    } else if (elem.webkitRequestFullscreen) { 
        elem.webkitRequestFullscreen();
    } else if (elem.msRequestFullscreen) { 
        elem.msRequestFullscreen();
    }
}
</script>

</body>
</html>
