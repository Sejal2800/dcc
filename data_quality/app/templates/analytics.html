<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genesis DCC - Query Analytics Data</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/dcc_logo.png') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

    <style>
        :root {
            --primary-dark: #2c3e50;
            --accent-green: #00ffc8;
            --glass-white: rgba(255, 255, 255, 0.95);
        }

        body {
            background: linear-gradient(rgba(44,62,80,0.8), rgba(44,62,80,0.8)),
                        url('{{ url_for("static", filename="images/dq_bg_6.png") }}') center/cover fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        /* --- Header: Wide Layout --- */
        .company-header {
            background: white;
            padding: 0.5rem 2%; 
            display: flex;
            align-items: center; 
            justify-content: space-between;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 1000;
            height: 90px;
            width: 100%;
        }

        .header-left {
            flex: 1;
            display: flex;
            justify-content: flex-start;
        }

        .header-logo {
            height: 75px; 
            width: auto;
            object-fit: contain;
        }

        .header-center {
            flex: 2;
            text-align: center;
        }

        .company-title {
            margin: 0;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--primary-dark);
            white-space: nowrap;
        }

        .header-right-actions {
            flex: 1;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        /* --- Nav & Account Buttons: Hover Fixes --- */
        .nav-action-btn, .btn-profile {
            background-color: #f8f9fa !important;
            border: 1px solid #dee2e6 !important;
            color: var(--primary-dark) !important;
            padding: 0 20px;
            border-radius: 50px;
            font-weight: 600;
            text-decoration: none;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            height: 42px; 
            transition: all 0.2s ease-in-out;
        }

        .nav-action-btn:hover, 
        .profile-dropdown .btn-profile:hover, 
        .profile-dropdown .btn-profile.show {
            background-color: var(--primary-dark) !important;
            color: #ffffff !important;
            border-color: var(--primary-dark) !important;
        }

        .nav-action-btn:hover i, .btn-profile:hover i, .btn-profile.show i {
            color: #ffffff !important;
        }

        /* --- Content Styling --- */
        .main-title {
            font-size: 2.8rem;
            font-weight: 700;
            margin-top: 2rem;
            margin-bottom: 2.5rem;
            text-align: center;
            text-shadow: 2px 4px 10px rgba(0,0,0,0.3);
        }

        .card {
            border-radius: 20px;
            border: none;
            background: var(--glass-white);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            color: #333;
        }

        .form-label {
            font-weight: 600;
            color: var(--primary-dark);
            display: block;
            text-align: left;
        }

        .btn-primary-custom {
            background: var(--primary-dark);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 12px 30px;
            font-weight: 700;
            transition: all 0.3s ease;
            width: 100%;
        }

        .btn-primary-custom:hover {
            background: #1a252f;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            color: white;
        }

        .results-heading {
            color: #ffffff;
            font-weight: 700;
            margin-top: 40px;
            border-bottom: 1px solid rgba(255,255,255,0.3);
            padding-bottom: 10px;
        }

        .table-responsive {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-top: 20px;
        }
    </style>
</head>
<body>

<header class="company-header">
    <div class="header-left">
        <img src="{{ url_for('static', filename='images/dcc_logo.png') }}" class="header-logo" alt="Logo">
    </div>

    <div class="header-center">
        <h1 class="company-title">Genesis Data Control Centre</h1>
    </div>

    <div class="header-right-actions">
        <a href="{{ url_for('welcome') }}" class="nav-action-btn">
            <i class="bi bi-arrow-left"></i> Back
        </a>
        <a href="{{ url_for('welcome') }}" class="nav-action-btn">
            <i class="bi bi-house"></i> Home
        </a>

        <div class="dropdown profile-dropdown">
            <button class="btn btn-profile dropdown-toggle" type="button" id="userMenu" data-bs-toggle="dropdown" aria-expanded="false">
                <i class="bi bi-person-circle"></i>
                <span class="d-none d-sm-inline">Account</span>
            </button>
            <ul class="dropdown-menu dropdown-menu-end shadow border-0" aria-labelledby="userMenu">
                <li><h6 class="dropdown-header">User Settings</h6></li>
                <li><a class="dropdown-item" href="#"><i class="bi bi-person-badge me-2"></i> My Details</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item text-danger" href="/logout"><i class="bi bi-box-arrow-right me-2"></i> Logout</a></li>
            </ul>
        </div>
    </div>
</header>

<main class="container py-5">
    <h1 class="main-title">Analyze Data</h1>

    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card p-4 p-md-5">
                <div class="mb-4 text-start">
                    <h5 class="fw-bold">Business Rule Input</h5>
                    <p class="text-muted">Enter the details below to execute your query analysis.</p>
                </div>

                <form id="ruleForm"> 
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label">Table Name</label>
                            <input type="text" id="Table_Name" class="form-control" placeholder="Optional">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Column Name</label>
                            <input type="text" id="Column_Name" class="form-control" placeholder="Optional">
                        </div>

                        <div class="col-md-12">
                            <label class="form-label">Business Rule Definition *</label>
                            <input type="text" id="Business_Rule_Definition" class="form-control" placeholder="Enter business rule" required>
                        </div>
                    </div>

                    <div class="mt-5 text-center">
                        <button type="button" class="btn btn-primary-custom" onclick="submitRule()">
                            <i class="bi bi-play-fill me-2"></i> Run Query
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div id="suggestionMessage" class="alert alert-info mt-4 d-none"></div>
    <div id="queryResultsContainer"></div>
</main>

<div class="modal fade" id="suggestionModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 rounded-4 shadow">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold">Input Data Checks</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input class="form-control mb-3" placeholder="Table name" id="s_table">
                <input class="form-control mb-3" placeholder="Column name" id="s_column">
                <textarea class="form-control mb-3" placeholder="Suggested business rule" id="s_rule" rows="3"></textarea>
            </div>
            <div class="modal-footer border-0 pt-0">
                <button class="btn btn-primary-custom" onclick="submitSuggestion()">Run</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    function showSuggestionMessage(msg) {
        const el = document.getElementById("suggestionMessage");
        el.innerText = msg;
        el.classList.remove("d-none");
    }

    function renderResults(data){
        const container = document.getElementById("queryResultsContainer");
        if(!data.columns || !data.rows) return;

        let html = `
        <h4 class="results-heading">Query Results</h4>
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-dark">
                    <tr>`;

        data.columns.forEach(col => html += `<th class="py-3 px-4">${col}</th>`);
        html += `</tr></thead><tbody>`;

        data.rows.forEach(row => {
            html += "<tr>";
            row.forEach(cell => html += `<td class="px-4">${cell}</td>`);
            html += "</tr>";
        });

        html += `</tbody></table></div>`;
        container.innerHTML = html;
    }

    function submitRule(){
        const formData = {
            table: document.getElementById("Table_Name").value.trim() || null,
            column: document.getElementById("Column_Name").value.trim() || null,
            rule: document.getElementById("Business_Rule_Definition").value.trim()
        };

        if (!formData.rule) {
            alert("Business Rule is required!");
            return;
        }

        fetch("/analytics_query", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(formData)
        })
        .then(res => res.json())
        .then(data => {
            if(data.status === "error"){
                alert(data.message);
                return;
            }
            renderResults(data);
        })
        .catch(err => console.error("Error:", err));
    }

    function submitSuggestion() {
        const data = {
            table: document.getElementById("s_table").value.trim() || null,
            column: document.getElementById("s_column").value.trim() || null,
            rule: document.getElementById("s_rule").value.trim()
        };

        if (!data.rule) {
            alert("Please enter the business rule.");
            return;
        }

        fetch("/submit_suggestion", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        })
        .then(res => res.json())
        .then(resp => {
            if (resp.status === "implemented") {
                renderResults(resp);
                showSuggestionMessage(resp.message);
                const modalEl = document.getElementById("suggestionModal");
                const modal = bootstrap.Modal.getInstance(modalEl);
                if(modal) modal.hide();
            } else {
                alert(resp.message || resp.error || "Suggestion failed");
            }
        })
        .catch(err => {
            console.error(err);
            alert("Server error");
        });
    }
</script>
</body>
</html>
