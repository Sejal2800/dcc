<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genesis DCC - Raw Data</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="icon" type="image/png"  href="{{ url_for('static', filename='images/dcc_logo.png') }}">
    <style>
        :root {
            --primary-dark: #2c3e50;
            --accent-green: #00ffc8;
            --glass-white: rgba(255, 255, 255, 0.95);
        }

        body {
            background: linear-gradient(rgba(44,62,80,0.8), rgba(44,62,80,0.8)),
                        url('{{ url_for("static", filename="images/dq_bg_6.png") }}') center/cover fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

/* --- Updated Header CSS --- */
.company-header {
    background: white;
    padding: 0.5rem 2%; /* Reduced from 5% to push elements to the edges */
    display: flex;
    align-items: center; 
    justify-content: space-between;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    position: sticky;
    top: 0;
    z-index: 1000;
    height: 90px;
    width: 100%;
}

.header-left {
    flex: 1;
    display: flex;
    justify-content: flex-start; /* Forces logo to the far left */
}

.header-logo {
    height: 85px; 
    width: auto;
    object-fit: contain;
}

.header-center {
    flex: 2;
    text-align: center;
}

.company-title {
    margin: 0;
    font-size: 1.6rem;
    font-weight: 700;
    color: #2c3e50;
    white-space: nowrap; /* Prevents title from wrapping */
}

.header-right-actions {
    flex: 1;
    display: flex;
    justify-content: flex-end; /* Forces buttons to the far right */
    gap: 12px;
}

.nav-action-btn, .btn-profile {
    background-color: #f8f9fa !important;
    border: 1px solid #dee2e6 !important;
    color: var(--primary-dark) !important;
    padding: 8px 18px;
    border-radius: 50px;
    font-weight: 600;
    text-decoration: none;
    font-size: 0.85rem;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    height: 42px;
    transition: all 0.2s ease-in-out;
}

/* FIX: Specific targeting for Hover and Open states */
.nav-action-btn:hover, 
.profile-dropdown .btn-profile:hover, 
.profile-dropdown .btn-profile.show,
.profile-dropdown .show > .btn-profile {
    background-color: var(--primary-dark) !important;
    color: #ffffff !important;
    border-color: var(--primary-dark) !important;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}

/* FIX: Ensure the icon changes color too */
.nav-action-btn:hover i, 
.btn-profile:hover i,
.btn-profile.show i {
    color: #ffffff !important;
}

/* Remove the default Bootstrap arrow rotation/shadow if desired */
.dropdown-toggle::after {
    vertical-align: middle;
}

        /* --- Main Content --- */
        .main-title {
            font-size: 2.8rem;
            font-weight: 700;
            margin-top: 2rem; /* Spacing from header */
            margin-bottom: 2.5rem;
            text-shadow: 2px 4px 10px rgba(0,0,0,0.3);
        }

        .card {
            border-radius: 20px;
            border: none;
            background: var(--glass-white);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            color: #333;
        }

        .form-select-lg {
            font-size: 1rem;
            border: 2px solid #eee;
        }

        /* Table Styling */
        .table-container {
            margin-top: 20px;
            border-radius: 15px;
            overflow: hidden;
            background: white;
        }
    </style>
</head>
<body>

<header class="company-header">
    <div class="header-left">
        <img src="{{ url_for('static', filename='images/dcc_logo.png') }}" class="header-logo" alt="Logo">
    </div>

    <div class="header-center">
        <h1 class="company-title">Genesis Data Control Centre</h1>
    </div>
    <div class="header-right-actions">
        <a href="{{ url_for('welcome') }}" class="nav-action-btn"><i class="bi bi-house-door-fill"></i> Home</a>
        <a href="{{ url_for('account_details') }}" class="nav-action-btn"><i class="bi bi-person-circle"></i> Account</a>
        <a href="{{ url_for('help_center') }}" class="nav-action-btn"><i class="bi bi-question-circle-fill"></i> Help</a>
        <a href="{{ url_for('logout') }}" class="nav-action-btn"><i class="bi bi-box-arrow-right"></i> Logout</a>
    </div>
</header>

{% block content %}

<div class="main-card">

    <h3 class="mb-4">Admin Dashboard</h3>

    <div class="row g-4">

        <div class="col-md-4">
            <div class="card p-3 shadow-sm">
                <h5>User Requests</h5>
                <p>Approve or reject access</p>
                <a href="{{ url_for('admin_requests') }}" class="btn btn-primary">View</a>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3 shadow-sm">
                <h5>Users</h5>
                <p>View registered users</p>
                <a href="{{ url_for('admin_users') }}" class="btn btn-primary">View</a>
            </div>
        </div>

        
    </div>

</div>

{% endblock %}
