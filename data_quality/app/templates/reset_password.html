<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Reset Password - Genesis DCC</title>

    <link rel="icon" type="image/png"
          href="{{ url_for('static', filename='images/dcc_logo.png') }}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            min-height:100vh;
            display:flex;
            font-family:'Segoe UI', sans-serif;
            overflow:hidden;
        }

        /* LEFT */
        .left-section{
            width:50%;
            display:flex;
            justify-content:center;
            align-items:center;
            position:relative;

            background:
                linear-gradient(rgba(20, 30, 48, 0.85),
                rgba(36, 59, 85, 0.92)),
                url("{{ url_for('static', filename='images/dq_bg_6.png') }}");

            background-size:cover;
            background-position:center;
        }

        /* RIGHT */
        .right-section{
            width:50%;
            height:100vh;

            background:
                linear-gradient(rgba(0,0,0,0.12),
                rgba(0,0,0,0.12)),
                url("{{ url_for('static', filename='images/dcc.png') }}");

            background-size:cover;
            background-position:center;
        }

        /* CARD */
        .card-glass{
            width:430px;
            padding:38px;
            border-radius:28px;

            background:rgba(255,255,255,0.12);
            backdrop-filter:blur(20px);

            border:1px solid rgba(255,255,255,0.18);

            box-shadow:
                0 20px 60px rgba(0,0,0,0.45),
                inset 0 1px 1px rgba(255,255,255,0.15);

            color:white;
        }

        .logo-wrap{
            text-align:center;
            margin-bottom:18px;
        }

        .logo-wrap img{
            height:58px;
            margin-bottom:10px;
        }

        .portal-title{
            font-size:28px;
            font-weight:700;
            letter-spacing:0.5px;
        }

        .portal-subtitle{
            font-size:14px;
            opacity:0.85;
            margin-top:5px;
        }

        /* INPUTS */
        .form-control{
            border-radius:18px;
            border:none;

            padding:14px 18px;

            background:rgba(255,255,255,0.16);
            color:white !important;

            font-size:14px;
        }

        .form-control::placeholder{
            color:rgba(255,255,255,0.72);
        }

        .form-control:focus{
            background:rgba(255,255,255,0.22);
            border:1px solid rgba(255,255,255,0.35);
            box-shadow:none;
        }

        /* BUTTON */
        .btn-rounded{
            border-radius:18px;
            padding:12px;
            font-weight:600;
            font-size:15px;
            transition:0.3s ease;
        }

        .btn-rounded:hover{
            transform:translateY(-1px);
        }

        /* HOME BUTTON */
        .home-btn{
            position:absolute;
            top:22px;
            left:22px;

            padding:10px 18px;
            border-radius:30px;
            border:none;

            background:rgba(255,255,255,0.18);
            color:white;

            backdrop-filter:blur(12px);

            font-size:14px;
            font-weight:500;

            transition:0.3s ease;
            z-index:20;
        }

        .home-btn:hover{
            background:rgba(255,255,255,0.32);
            cursor:pointer;
        }

        /* OTP BUTTON */
        .otp-btn{
            background:#0d6efd;
            border:none;
            color:white;
            padding:10px 15px;
            border-radius:14px;
            font-size:14px;
            transition:0.3s;
        }

        .otp-btn:hover{
            background:#0b5ed7;
        }

        /* SUCCESS POPUP */
        .popup-overlay{
            position:fixed;
            inset:0;

            background:rgba(0,0,0,0.68);

            display:none;
            justify-content:center;
            align-items:center;

            z-index:9999;
        }

        .popup-card{
            width:380px;

            padding:35px;
            border-radius:25px;

            background:rgba(255,255,255,0.12);
            backdrop-filter:blur(24px);

            border:1px solid rgba(255,255,255,0.15);

            color:white;
            text-align:center;

            animation:popupScale 0.35s ease;
        }

        @keyframes popupScale{
            from{
                opacity:0;
                transform:scale(0.8);
            }
            to{
                opacity:1;
                transform:scale(1);
            }
        }

        /* CHECKMARK */
        .checkmark-wrapper{
            display:flex;
            justify-content:center;
            margin-bottom:18px;
        }

        .checkmark-circle{
            width:85px;
            height:85px;

            border-radius:50%;
            border:3px solid #4CAF50;

            position:relative;

            animation:pop 0.4s ease;
        }

        @keyframes pop{
            0%{ transform:scale(0); }
            100%{ transform:scale(1); }
        }

        .checkmark{
            position:absolute;
            top:18px;
            left:28px;

            width:18px;
            height:38px;

            border-right:5px solid #4CAF50;
            border-bottom:5px solid #4CAF50;

            transform:rotate(45deg);

            animation:draw 0.5s ease forwards;
        }

        @keyframes draw{
            from{
                width:0;
                height:0;
            }
            to{
                width:18px;
                height:38px;
            }
        }

        /* RESPONSIVE */
        @media(max-width:992px){

            body{
                flex-direction:column;
                overflow:auto;
            }

            .left-section,
            .right-section{
                width:100%;
            }

            .right-section{
                display:none;
            }

            .left-section{
                min-height:100vh;
                padding:40px 20px;
            }

            .card-glass{
                width:100%;
                max-width:430px;
            }
        }

    </style>
</head>

<body>

    <!-- HOME BUTTON -->
    <button class="home-btn" onclick="goHome()">
        ← Home
    </button>

    <!-- LEFT -->
    <div class="left-section">

        <div class="card-glass">

            <div class="logo-wrap">

                <img src="{{ url_for('static', filename='images/dcc_logo.png') }}"
                     alt="Genesis DCC">

                <div class="portal-title">
                    Genesis DCC
                </div>

                <div class="portal-subtitle">
                    Data Quality Control Centre
                </div>

            </div>

            <h3 class="text-center mb-2">
                Reset Password
            </h3>

            <p class="text-center mb-4" style="opacity:0.9;">
                Verify your OTP and create a new password
            </p>

            <!-- FORM -->
            <form id="resetForm">

                <input
                    type="text"
                    id="username"
                    class="form-control mb-3"
                    placeholder="Username"
                    required
                >

                <div class="d-flex gap-2 mb-3">

                    <input
                        type="text"
                        id="otp"
                        class="form-control"
                        placeholder="Enter OTP"
                        required
                    >

                    <button
                        type="button"
                        class="otp-btn"
                        onclick="sendOTP()"
                    >
                        Send OTP
                    </button>

                </div>

                <input
                    type="password"
                    id="new_password"
                    class="form-control mb-3"
                    placeholder="New Password"
                    required
                >

                <input
                    type="password"
                    id="confirm_password"
                    class="form-control mb-4"
                    placeholder="Confirm Password"
                    required
                >

                <button
                    type="submit"
                    class="btn btn-success w-100 btn-rounded"
                >
                    Reset Password
                </button>

            </form>

        </div>

    </div>

    <!-- RIGHT -->
    <div class="right-section"></div>

    <!-- SUCCESS POPUP -->
    <div id="successPopup" class="popup-overlay">

        <div class="popup-card">

            <div class="checkmark-wrapper">

                <div class="checkmark-circle">
                    <div class="checkmark"></div>
                </div>

            </div>

            <h4 class="mb-3">
                Password Updated
            </h4>

            <p style="line-height:1.7;">
                Your password has been reset successfully.
                <br><br>
                You can now login using your new password.
            </p>

            <button
                class="btn btn-light mt-3 px-4"
                onclick="goLogin()"
            >
                Login
            </button>

        </div>

    </div>

    <script>

        function sendOTP(){

            const username = document.getElementById("username").value;

            if(!username){
                alert("Please enter username");
                return;
            }

            fetch("/send_otp", {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    username:username
                })
            })
            .then(res => res.json())
            .then(data => {

                if(data.status === "success"){
                    alert("OTP sent successfully");
                }
                else{
                    alert(data.message || "Failed to send OTP");
                }

            })
            .catch(err => {
                console.error(err);
                alert("Something went wrong");
            });

        }

        document.getElementById("resetForm")
        .addEventListener("submit", function(e){

            e.preventDefault();

            const username = document.getElementById("username").value;
            const otp = document.getElementById("otp").value;
            const password = document.getElementById("new_password").value;
            const confirm = document.getElementById("confirm_password").value;

            if(password !== confirm){
                alert("Passwords do not match");
                return;
            }

            fetch("/verify_otp", {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    username:username,
                    otp:otp,
                    password:password
                })
            })
            .then(res => res.json())
            .then(data => {

                if(data.status === "success"){
                    showSuccess();
                }
                else{
                    alert(data.message || "Reset failed");
                }

            })
            .catch(err => {
                console.error(err);
                alert("Something went wrong");
            });

        });

        function showSuccess(){
            document.getElementById("successPopup").style.display = "flex";
        }

        function goLogin(){
            window.location.href = "/login";
        }

        function goHome(){
            window.location.href = "/";
        }

    </script>

</body>
</html>
